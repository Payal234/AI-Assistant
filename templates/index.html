<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groq Chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1025;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 720px;
      height: 90vh;
      background: #1e1330;
      border-radius: 20px;
      border: 1px solid #3d2b6e;
      overflow: hidden;
    }

    #header {
      padding: 14px 18px;
      border-bottom: 1px solid #3d2b6e;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #231540;
    }
    .avatar {
      width: 38px; height: 38px; border-radius: 12px;
      background: #4c1d95;
      border: 1px solid #6d28d9;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar i { font-size: 20px; color: #c4b5fd; }
    .info .name { font-size: 14px; font-weight: 500; color: #ede9fe; }
    .info .status { font-size: 12px; color: #a78bfa; display: flex; align-items: center; gap: 4px; }
    .status .dot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; }
    .model-badge {
      margin-left: auto; font-size: 11px; color: #a78bfa;
      background: #2e1f5e; border: 1px solid #4c3a8c;
      padding: 4px 10px; border-radius: 20px;
    }

    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: #4c3a8c; border-radius: 4px; }

    .msg { display: flex; gap: 8px; max-width: 82%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .bubble {
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 14px; line-height: 1.65;
    }
    .msg.user .bubble {
      background: #5b21b6; color: #ede9fe;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: #2a1d4a; color: #ddd6fe;
      border: 1px solid #4c3a8c;
      border-bottom-left-radius: 4px;
    }

    .micro-avatar {
      width: 30px; height: 30px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .msg.assistant .micro-avatar { background: #2e1f5e; border: 1px solid #4c3a8c; }
    .msg.assistant .micro-avatar i { font-size: 15px; color: #a78bfa; }
    .msg.user .micro-avatar { background: #4c1d95; border: 1px solid #6d28d9; }
    .msg.user .micro-avatar i { font-size: 15px; color: #c4b5fd; }

    .typing { display: flex; gap: 5px; align-items: center; padding: 2px 0; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #7c3aed; animation: pulse 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse {
      0%, 60%, 100% { transform: scale(1); opacity: .5; }
      30% { transform: scale(1.4); opacity: 1; }
    }

    #error-banner {
      display: none; margin: 0 16px 8px;
      padding: 10px 14px; background: #2d0f1a;
      border: 1px solid #7f1d36; border-radius: 10px;
      font-size: 13px; color: #fca5a5;
    }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
    }
    .empty-state .empty-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: #2e1f5e; border: 1px solid #4c3a8c;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }
    .empty-state .empty-icon i { font-size: 28px; color: #a78bfa; }
    .empty-state h3 { font-size: 15px; font-weight: 500; color: #ddd6fe; }
    .empty-state p { font-size: 13px; color: #7c6fad; }

    #input-area {
      padding: 14px 16px;
      border-top: 1px solid #3d2b6e;
      display: flex; gap: 10px; align-items: flex-end;
      background: #231540;
    }
    #msg-input {
      flex: 1; resize: none;
      border: 1px solid #4c3a8c; border-radius: 12px;
      padding: 11px 14px; font-size: 14px;
      font-family: inherit; line-height: 1.5;
      min-height: 44px; max-height: 120px;
      outline: none; overflow-y: auto;
      color: #ede9fe; background: #2a1d4a;
      transition: border-color .2s, box-shadow .2s;
    }
    #msg-input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
    }
    #msg-input::placeholder { color: #6b5fa0; }

    #send-btn {
      width: 44px; height: 44px; border-radius: 12px;
      background: #7c3aed; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s, transform .1s;
    }
    #send-btn:hover { background: #6d28d9; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn i { font-size: 20px; color: #fff; }

    /* Mobile responsive */
    @media (max-width: 500px) {
      body { padding: 0; }
      #app { height: 100vh; border-radius: 0; border: none; max-width: 100%; }
      .msg { max-width: 90%; }
    }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="avatar"><i class="ti ti-robot"></i></div>
    <div class="info">
      <div class="name">Groq Assistant</div>
      <div class="status"><span class="dot"></span>Ready</div>
    </div>
    <div class="model-badge">llama-3.1-8b-instant</div>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty">
      <div class="empty-icon"><i class="ti ti-message-circle"></i></div>
      <h3>Start a conversation</h3>
      <p>Ask me anything below</p>
    </div>
  </div>

  <div id="error-banner"></div>

  <div id="input-area">
    <textarea id="msg-input" rows="1" placeholder="Type a message… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send-btn" aria-label="Send"><i class="ti ti-arrow-up"></i></button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const errorBanner = document.getElementById('error-banner');

  let history = [];
  let busy = false;

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
    setTimeout(() => errorBanner.style.display = 'none', 5000);
  }

  function addMessage(role, text) {
    const empty = document.getElementById('empty');
    if (empty) empty.remove();

    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'micro-avatar';
    avatar.innerHTML = role === 'assistant'
      ? '<i class="ti ti-robot"></i>'
      : '<i class="ti ti-user"></i>';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTyping() {
    const empty = document.getElementById('empty');
    if (empty) empty.remove();

    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'micro-avatar';
    avatar.innerHTML = '<i class="ti ti-robot"></i>';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function send() {
    if (busy) return;
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    busy = true;
    sendBtn.disabled = true;

    history.push({ role: 'user', content: text });
    addMessage('user', text);
    addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      removeTyping();

      if (!res.ok || data.error) {
        showError(data.error || 'Something went wrong.');
        history.pop();
      } else {
        history.push({ role: 'assistant', content: data.reply });
        addMessage('assistant', data.reply);
      }
    } catch (err) {
      removeTyping();
      showError('Network error — is the Flask server running?');
      history.pop();
    }

    busy = false;
    sendBtn.disabled = false;
    input.focus();
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  sendBtn.addEventListener('click', send);
</script>

</body>
</html>
